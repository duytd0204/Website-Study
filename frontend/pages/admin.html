<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | TLU Learning Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/app.css" />
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/base_view.js"></script>
</head>
<body>

<div class="app-layout">
  <aside class="sidebar" id="sidebar" style="background:linear-gradient(180deg,#8B0000,#5C0000)">
    <div class="sidebar-header">
      <div class="sidebar-logo">TLU</div>
      <div class="sidebar-brand">
        <h4>Admin Panel</h4>
        <p>Quản trị hệ thống</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section-title">Quản trị</div>
      <a class="sidebar-link" data-view="overview">Tổng quan</a>
      <a class="sidebar-link" data-view="users">Người dùng</a>
      <a class="sidebar-link" data-view="curriculum">Chương trình đào tạo</a>

      <div class="sidebar-section-title">Khác</div>
      <a class="sidebar-link" href="/pages/app.html">Chuyển sang App</a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-avatar" id="userAvatar">A</div>
      <div class="user-info">
        <div class="name" id="userName">Admin</div>
        <div class="email" id="userEmail">admin@tlu.edu.vn</div>
      </div>
      <button class="btn-logout" id="btnLogout" title="Đăng xuất">↪</button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="topbar-toggle" id="topbarToggle">☰</button>
      <h2 class="topbar-title" id="pageTitle">Tổng quan</h2>
      <div class="topbar-actions">
        <span class="badge badge-danger" style="font-size:11px">Chế độ Quản trị</span>
      </div>
    </header>

    <main class="content" id="content">
      <div style="display:flex;align-items:center;justify-content:center;padding:80px 20px">
        <div class="spinner spinner-lg"></div>
      </div>
    </main>
  </div>
</div>

<script src="/js/admin_app.js"></script>
</body>
</html>
